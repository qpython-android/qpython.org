<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>QPython Documentation</title>
    <meta http-equiv="refresh" content="0; url=en/">
    <style>
        body {
            font-family: Roboto, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #000;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo img {
            height: 80px;
        }
        h1 {
            font-weight: 300;
            margin-bottom: 40px;
        }
        .languages {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .lang-btn {
            padding: 15px 40px;
            border: 2px solid #49B300;
            color: #49B300;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
            font-size: 18px;
        }
        .lang-btn:hover {
            background: #49B300;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="en/static/img_logo.png" alt="QPython">
        </div>
        <h1>Choose your language / 选择语言</h1>
        <div class="languages">
            <a href="en/" class="lang-btn">English</a>
            <a href="zh/" class="lang-btn">中文</a>
        </div>
    </div>
</body>
</html>
